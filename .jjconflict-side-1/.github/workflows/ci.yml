# CI for qwertty-term. Owned by thread T8 (docs/threads/t8-ops-upstream.md).
# What CI does and does NOT cover: docs/ci.md.
#
# Toolchain is PINNED to an explicit version (see RUST_TOOLCHAIN below) rather
# than `stable`, so a new rustc release can't red the shared gate mid-work for
# every thread (that is exactly what 1.97's new lints did). T8 bumps the pin
# deliberately after verifying clippy/fmt are green at the new version.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.97.0

jobs:
  # The platform-independent core on the free Linux runner: full vt tests
  # (debug + the mandatory --release lane, which includes the property/
  # differential integration tests), vt-diff without the Zig reference
  # oracle, sibling core crates, fmt, clippy.
  linux-core:
    name: Linux core (vt tests, release lane, clippy, fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      # Explicit allowlist of the platform-independent crates. Deliberately
      # NOT `--workspace --exclude ...`: the macOS-surface crates fail on Linux
      # for different reasons and a new one must be added here consciously.
      #   qwertty-term-spike — source not cfg-gated for non-macOS targets
      #     (does not even compile on Linux).
      #   qwertty-term-renderer — compiles + lints clean on Linux since ADR 003
      #     P1 gated its macOS-only tests (lib is already cfg-gated; the Metal
      #     backend/engine are `#[cfg(target_os = "macos")]`). Included below.
      #   qwertty-term (the app) — compiles, but its theme/color code is
      #     `#[cfg(target_os = "macos")]`-gated, so it is dead code on Linux
      #     and trips `-D dead_code`. The app's clippy runs on the macOS job.
      - name: clippy (platform-independent core crates)
        run: >
          cargo clippy
          -p qwertty-term-vt
          -p vt-diff
          -p qwertty-term-input
          -p qwertty-term-sprite
          -p qwertty-term-termio
          -p qwertty-term-ffi
          -p qwertty-term-renderer
          -p qwertty-term-font
          -p spike-runtime
          -p frame-capture
          -p xtask
          --all-targets -- -D warnings

      - name: vt tests (debug, all targets)
        run: cargo test -p qwertty-term-vt --all-targets

      - name: vt tests (release lane — never skipped)
        run: cargo test -p qwertty-term-vt --release --all-targets

      # (The two former load-sensitive termio skips are gone: the runtime
      # assertion now only fires where there's no /usr/bin/login wrapper — i.e.
      # Linux, where it's reliable — and the throughput floor only asserts
      # off-CI. See docs/ci.md.)
      - name: core crate tests (vt-diff non-reference, input, sprite, termio, ffi)
        run: >
          cargo test
          -p vt-diff
          -p qwertty-term-input
          -p qwertty-term-sprite
          -p qwertty-term-termio
          -p qwertty-term-ffi

      # The betamax headless-render artifact (ADR 003): render a terminal frame
      # on Linux with no GPU, no window, no CoreText — `Engine<Software>` over
      # the FreeType font stack (auto-enabled by the renderer's non-macOS dep).
      # This is the whole point of the headless-first strategy, so it runs on
      # the free Linux runner, not just macOS.
      - name: headless render (Engine<Software>, no GPU)
        run: cargo test -p qwertty-term-renderer --test software_headless

  # Modest macOS job: lint + build + unit tests for the macOS-only surface
  # (renderer, font, app). GPU-dependent tests skip themselves when no Metal
  # device is available; the windowed/offscreen app smokes stay local-only.
  macos-build:
    name: macOS build + unit tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: clippy (full workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # (The two former load-sensitive termio skips are gone — the runtime
      # assertion is gated off the macOS login wrapper and the throughput floor
      # off-CI; see docs/ci.md.)
      - name: unit tests (debug)
        run: cargo test --workspace

      # The `freetype` feature of qwertty-term-font is off by default (ADR 003
      # P1/P2), so the workspace clippy/test steps above never build the
      # FreeType face path — it can rot silently. FreeType is cross-platform and
      # builds here via freetype-rs's bundled C build (cc), so cover it on the
      # macOS job. See docs/ci.md → "Optional-feature coverage".
      - name: font freetype feature (clippy + tests)
        run: |
          cargo clippy -p qwertty-term-font --features freetype --all-targets -- -D warnings
          cargo test -p qwertty-term-font --features freetype

  # Lint only the Markdown files touched by this push/PR — matching the
  # local gate ("markdownlint the touched .md"). The repo has pre-existing
  # violations in untouched files; a repo-wide sweep is tracked separately.
  markdownlint:
    name: markdownlint (changed files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: lint changed .md files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            # first push / force push: fall back to the parent commit
            if ! git cat-file -e "$base" 2>/dev/null; then
              base=$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)
            fi
          fi
          changed=$(git diff --name-only --diff-filter=d "$base" HEAD -- '*.md')
          if [ -z "$changed" ]; then
            echo "no Markdown files changed"
            exit 0
          fi
          echo "$changed"
          echo "$changed" | xargs npx --yes markdownlint-cli2@0.23.0
