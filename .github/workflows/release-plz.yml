# release-plz: automated releases for the qwertty-term crate family.
#
# Mirrors the ratatui org's trusted-publishing setup. On push to `main`:
#   * `release-plz-pr` opens/updates a single release PR (shared workspace
#     version bump + changelog).
#   * `release-plz-release` publishes every crate to crates.io in dependency
#     order and tags the release when that PR merges.
#
# Nothing publishes without a human merging the release PR.
#
# Publishing uses crates.io **Trusted Publishing** (OIDC) via
# `rust-lang/crates-io-auth-action`, which mints a short-lived token from the
# `id-token: write` permission + the `release` GitHub environment. No long-lived
# `CARGO_REGISTRY_TOKEN` secret. Before the first release, add a Trusted
# Publisher to EACH of the eight crates on crates.io (owner `joshka`, repo
# `qwertty-term`, workflow `release-plz.yml`, environment `release`).

name: Release-plz

permissions: {}

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Publish + tag when a release PR merges.
  release-plz-release:
    name: Release-plz release
    environment: release
    permissions:
      pull-requests: write
      contents: write
      id-token: write # crates.io Trusted Publishing (OIDC)
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'joshka' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Mint a crates.io token (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth
      - name: Run release-plz (release)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Open / update the release PR (version bump + changelog).
  release-plz-pr:
    name: Release-plz PR
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'joshka' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Run release-plz (release-pr)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
