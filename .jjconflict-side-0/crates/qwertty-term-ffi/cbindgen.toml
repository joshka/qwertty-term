language = "C"
header = """/*
 * qwertty_term.h -- C ABI for the qwertty-term engine (M5 FFI spike scope).
 *
 * GENERATED by cbindgen from crates/qwertty-term-ffi. DO NOT EDIT BY HAND.
 * Regenerate + drift-check: `cargo test -p qwertty-term-ffi header_drift`.
 *
 * Naming mirrors upstream include/ghostty.h (opaque handles, sized *_s
 * structs, *_e enums) so upstream's Swift sources can be ADAPTED, not
 * rewritten. See docs/analysis/ffi-spike.md for the threading contract and
 * the go/no-go note.
 */"""
include_guard = "QWERTTY_TERM_H"
tab_width = 2
style = "type"
cpp_compat = true
usize_is_size_t = true

[export]
prefix = ""

[enum]
# QualifiedScreamingSnakeCase already prefixes each variant with the enum name
# (e.g. QWERTTY_TERM_RESULT_SUCCESS), matching upstream ghostty.h's *_e style.
# Do NOT also set prefix_with_name — that double-prefixes.
rename_variants = "QualifiedScreamingSnakeCase"

[parse]
parse_deps = false

[fn]
sort_by = "None"

[export.rename]
"FfiApp" = "qwertty_term_app_t"
"FfiSurface" = "qwertty_term_surface_t"
